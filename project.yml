name: Nook
options:
  bundleIdPrefix: com.kalwaleed
  deploymentTarget:
    macOS: "13.0"

packages:
  NookKit:
    path: NookKit

targets:
  Nook:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    bundleId: com.kalwaleed.nook
    sources:
      - Nook
    dependencies:
      - package: NookKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.kalwaleed.nook
        INFOPLIST_FILE: Nook/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
